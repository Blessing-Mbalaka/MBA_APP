<!-- @format -->
{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Invitation</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f9f9f9;
        color: #333;
        padding: 20px;
        line-height: 1.6;
      }

      a {
        color: #1a73e8;
        text-decoration: none;
        font-weight: bold;
      }

      a:hover {
        text-decoration: underline;
      }

      .container {
        background: #ffffff;
        border: 1px solid #ddd;
        padding: 20px;
        max-width: 600px;
        margin: auto;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      }
    </style>
  </head>
  <body>
    <div class="container">
      Good day,
      <br />
      You are invited to assessr project <strong>{{ project.project_title}}</strong> on our johannesburg Business School MBA platform!
        <br />
      Login on to the platform to accept the invitation 
      <br />
      kind regards,
      <br>
JBS (johannesburg Business School)
<div style="height: 100px; margin-top: 20px; display: flex; align-items: center; justify-content: center;">
     <img src="https://jbs.ac.za/wp-content/webp-express/webp-images/uploads/2025/03/JBSUJ20-400x363.png.webp" style="height: 100%;" alt="JBS Logo" />
</div>
    </div>
  </body>
</html>
