<!-- @format -->

<!-- Main modal -->
<div id="attachments-{{modal_id}}" tabindex="-1" aria-hidden="true" class="hidden overflow-y-auto overflow-x-hidden fixed top-0 right-0 left-0 z-50 justify-center items-center w-full md:inset-0 h-[calc(100%-1rem)] max-h-full">
  <div class="relative p-4 w-full max-w-md max-h-full">
    <!-- Modal content -->
    <div class="relative bg-white rounded-lg shadow-sm dark:bg-gray-700">
      <!-- Modal header -->
      <div class="flex items-center justify-between p-4 md:p-5 border-b rounded-t dark:border-gray-600 border-gray-200">
        <h3 class="text-lg font-semibold text-gray-900 dark:text-white">Attachments Forms</h3>
        <button type="button" class="text-gray-400 bg-transparent hover:bg-gray-200 hover:text-gray-900 rounded-lg text-sm w-8 h-8 ms-auto inline-flex justify-center items-center dark:hover:bg-gray-600 dark:hover:text-white" data-modal-toggle="attachments-{{modal_id}}">
          <svg class="w-3 h-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14">
            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6" />
          </svg>
          <span class="sr-only">Close modal</span>
        </button>
      </div>
      <!-- Modal Body -->
<div class="p-6 space-y-4">
  <!-- Student Supervisor Form -->
  <a 
    href="{% url 'mba_main:student_supervisor_form' project_id=project.id %}" 
    target="_blank"
    class="block odd:bg-pink-50 even:bg-indigo-50 border border-indigo-200 dark:border-indigo-800 rounded-lg p-4 text-indigo-700 dark:text-indigo-300 font-medium hover:bg-indigo-100 dark:hover:bg-indigo-900 transition-colors duration-200"
  >
    📄 Student Supervisor Form
  </a>

  <!-- Notice to Submit Form -->
  <a 
    href="{% url 'mba_main:notice_form' id=project.id %}" 
    target="_blank"
    class="block odd:bg-pink-50 even:bg-indigo-50 border border-yellow-200 dark:border-yellow-800 rounded-lg p-4 text-yellow-700 dark:text-yellow-300 font-medium hover:bg-yellow-100 dark:hover:bg-yellow-900 transition-colors duration-200"
  >
    📢 Notice To Submit Form
  </a>

  <!-- Nomination of Assessor Form -->
  <a 
  target="_blank"
    href="{% url 'mba_main:nominaton_form' project_id=project.id %}" 
    class="block odd:bg-pink-50 even:bg-indigo-50 dark:bg-pink-900/20 border border-pink-200 dark:border-pink-800 rounded-lg p-4 text-pink-700 dark:text-pink-300 font-medium hover:bg-pink-100 dark:hover:bg-pink-900 transition-colors duration-200"
  >
    📝 Nomination of Assessor Form
  </a>

  
  <a 
  target="_blank"
    href="{% url 'mba_main:jbs5_form' project_id=project.id %}" 
    class="block odd:bg-pink-50 even:bg-indigo-50 border border-pink-200 dark:border-pink-800 rounded-lg p-4 text-pink-700 dark:text-pink-300 font-medium hover:bg-pink-100 dark:hover:bg-pink-900 transition-colors duration-200"
  >
    📝 JBS5
  </a>
  
  <a 
  target="_blank"
    href="{% url 'mba_main:jbs10_form' project_id=project.id %}" 
    class="block odd:bg-pink-50 even:bg-indigo-50 border border-pink-200 dark:border-pink-800 rounded-lg p-4 text-pink-700 dark:text-pink-300 font-medium hover:bg-pink-100 dark:hover:bg-pink-900 transition-colors duration-200"
  >
    📝 JBS10
  </a>
  


</div>

    </div>
  </div>
</div>
