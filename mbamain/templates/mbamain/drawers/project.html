

<!-- drawer component -->
<div id="project-drawer" class="fixed bottom-0 left-0 right-0 z-40 w-full p-4   overflow-y-auto transition-transform bg-white dark:bg-gray-800 transform-none" tabindex="-1" aria-labelledby="drawer-bottom-label">
    <h5 id="drawer-bottom-label" class="inline-flex items-center mb-4 text-base font-semibold text-gray-500 dark:text-gray-400">Projects Without Superviors</h5>
    <button type="button" data-drawer-hide="project-drawer" aria-controls="project-drawer" class="text-gray-400 bg-transparent hover:bg-gray-200 hover:text-gray-900 rounded-lg text-sm w-8 h-8 absolute top-2.5 end-2.5 inline-flex items-center justify-center dark:hover:bg-gray-600 dark:hover:text-white" >
      <svg class="w-3 h-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14">
         <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/>
      </svg>
      <span class="sr-only">Close menu</span>
   </button>

   <div class="h-96  overflow-y-auto  ">
        {%if projects %}

  <ul class=" text-sm font-medium text-gray-900 bg-white border border-gray-200 rounded-lg dark:bg-gray-700 dark:border-gray-600 dark:text-white">
          {%for project in projects %}
    <li class="w-full border-b border-gray-200 rounded-t-lg dark:border-gray-600">
        <div class="flex items-center ps-3">
            <input id="list-radio-{{project.id}}" type="radio" value="{{project.id}}" name="selected_project" class=" h-4 text-blue-600 bg-gray-100 border-gray-300 focus:ring-blue-500 dark:focus:ring-blue-600 dark:ring-offset-gray-700 dark:focus:ring-offset-gray-700 focus:ring-2 dark:bg-gray-600 dark:border-gray-500">
            <label for="list-radio-{{project.id}}" class="w-full py-3 ms-2 text-sm font-medium text-gray-900 dark:text-gray-300">{{project.project_title}}</label>
        </div>
    </li>   
          {%endfor%}
  </ul> 
  <button id="select-project" class="w-full mt-4 px-4 py-2 text-sm font-medium text-white bg-blue-600 border border-gray-200 rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-4 focus:ring-gray-200 dark:focus:ring-gray-700">
      Assign supervisor to this project
    </button>
        {%else%}
        <div>
        <h1 class="text-lg font-semibold text-gray-700 dark:text-gray-300">No projects found</h1>
        <p class="text-sm text-gray-500 dark:text-gray-400">You can add a new project to get started.</p>
        </div>
        {%endif%}
  </div>
   </div>
</div>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    const drawerElement = document.getElementById('project-drawer');
    const drawerInstance = new Drawer(drawerElement, { placement: 'bottom' });
    drawerInstance.hide();  
  });
</script>
