<label for="sdg" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Select SDG goal  </label>
<select id="sdg"  name="sdg" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"> 
  {%for goal in GOALS %}
  <option {% if sdg == goal %}selected{% endif %} value='{{goal}}'>{{goal}}</option>
  {%endfor%}
</select>
