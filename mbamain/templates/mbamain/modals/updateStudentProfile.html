<!-- @format -->

<!-- Main modal -->
<div id="{{modal_id}}" tabindex="-1" aria-hidden="true" class="hidden overflow-y-auto overflow-x-hidden fixed top-0 right-0 left-0 z-50 justify-center items-center w-full md:inset-0 h-[calc(100%-1rem)] max-h-full">
  <div class="relative p-4 w-full max-w-md max-h-full">
    <!-- Modal content -->
    <div class="relative bg-white rounded-lg shadow-sm dark:bg-gray-700">
      <!-- Modal header -->
      <div class="flex items-center justify-between p-4 md:p-5 border-b rounded-t dark:border-gray-600 border-gray-200">
        <h3 class="text-lg font-semibold text-gray-900 dark:text-white">Update Profile</h3>
        <button type="button" class="text-gray-400 bg-transparent hover:bg-gray-200 hover:text-gray-900 rounded-lg text-sm w-8 h-8 ms-auto inline-flex justify-center items-center dark:hover:bg-gray-600 dark:hover:text-white" data-modal-toggle="{{modal_id}}">
          <svg class="w-3 h-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14">
            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6" />
          </svg>
          <span class="sr-only">Close modal</span>
        </button>
      </div>

      <!-- Modal body -->
      <form class="p-4 md:p-5 space-y-4" method="post" action="{% url 'mba_main:update_student_profile' %}">
        {% csrf_token %}

        <!-- Title -->
        <div class="grid gap-4 grid-cols-2">
          <div class="col-span-2">
            <label for="title" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Title</label>
            <input type="text" name="title" id="title" value="{{user.student_profile.title|default:''}}"
              class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-primary-600 focus:border-primary-600 block w-full p-2.5 dark:bg-gray-600 dark:border-gray-500 dark:text-white dark:focus:ring-primary-500 dark:focus:border-primary-500"
              placeholder="Enter title">
          </div>
        </div>

        <!-- Name and Surname -->
        <div class="grid gap-4 grid-cols-2">
          <div class="col-span-1">
            <label for="name" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Name</label>
            <input type="text" name="name" id="name" value="{{user.student_profile.name|default:''}}"
              class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg block w-full p-2.5 dark:bg-gray-600 dark:border-gray-500 dark:text-white"
              placeholder="Enter first name">
          </div>
          <div class="col-span-1">
            <label for="surname" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Surname</label>
            <input type="text" name="surname" id="surname" value="{{user.student_profile.surname|default:''}}"
              class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg block w-full p-2.5 dark:bg-gray-600 dark:border-gray-500 dark:text-white"
              placeholder="Enter last name">
          </div>
        </div>

        <!-- Contact & Secondary Email -->
        <div class="grid gap-4 grid-cols-2">
          <div class="col-span-1">
            <label for="contact" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Phone</label>
            <input type="text" name="contact_number" id="contact" value="{{user.student_profile.contact|default:''}}"
              class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg block w-full p-2.5 dark:bg-gray-600 dark:border-gray-500 dark:text-white"
              placeholder="Enter phone number">
          </div>
          <div class="col-span-1">
            <label for="secondary_email" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Secondary Email</label>
            <input type="email" name="secondary_email" id="secondary_email" value="{{user.student_profile.secondary_email|default:''}}"
              class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg block w-full p-2.5 dark:bg-gray-600 dark:border-gray-500 dark:text-white"
              placeholder="Enter secondary email">
          </div>
        </div>

        <!-- Student No & Module -->
        <div class="grid gap-4 grid-cols-2">
          <div class="col-span-1">
            <label for="module" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Module</label>
            <input type="text" name="module" id="module" value="{{user.student_profile.module|default:''}}"
              class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg block w-full p-2.5 dark:bg-gray-600 dark:border-gray-500 dark:text-white"
              placeholder="Enter module">
          </div>
        </div>

        <!-- Block ID & Degree -->
        <div class="grid gap-4 grid-cols-2">
          <div class="col-span-1">
            <label for="degree" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Degree</label>
            <input type="text" name="degree" id="degree" value="{{user.student_profile.degree|default:'MBA'}}"
              class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg block w-full p-2.5 dark:bg-gray-600 dark:border-gray-500 dark:text-white"
              placeholder="Enter degree">
          </div>
        </div>

        <!-- Address -->
        <div class="grid gap-4 grid-cols-2">
          <div class="col-span-2">
            <label for="address" class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">Address</label>
            <textarea name="address" id="address" rows="2"
              class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg block w-full p-2.5 dark:bg-gray-600 dark:border-gray-500 dark:text-white"
              placeholder="Enter address">{{ user.student_profile.address|default:'' }}</textarea>
          </div>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="text-white inline-flex items-center bg-blue-700 hover:bg-blue-800 focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-2.5 text-center dark:bg-blue-600 dark:hover:bg-blue-700 dark:focus:ring-blue-800">
          <svg class="me-1 -ms-1 w-5 h-5" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
            <path fill-rule="evenodd" d="M10 5a1 1 0 011 1v3h3a1 1 0 110 2h-3v3a1 1 0 11-2 0v-3H6a1 1 0 110-2h3V6a1 1 0 011-1z" clip-rule="evenodd"></path>
          </svg>
          Update Profile
        </button>
      </form>
    </div>
  </div>
</div>
